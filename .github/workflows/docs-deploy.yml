name: Deploy mdBook docs to Pages

on:
  push:
    branches: [master, feat/docs-mdbook-poc]
    paths:
      - "docs/book/**"
      - "src/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      MDBOOK_VERSION: v0.5.2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install mdBook (aarch64 musl, ~3MB)
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-aarch64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs-deploy

      - name: Install json-schema-for-humans
        run: pipx install json-schema-for-humans

      - name: Build zeroclaw (schema-export only, no agent-runtime)
        run: cargo build --no-default-features --features schema-export

      - name: Generate CLI reference from clap
        run: |
          mkdir -p docs/book/src/reference
          cargo run --no-default-features --features schema-export -- markdown-help \
            > docs/book/src/reference/cli.md

      - name: Generate Config reference from JSON Schema
        run: |
          cargo run --no-default-features --features schema-export -- markdown-schema \
            > /tmp/config.schema.json
          generate-schema-doc --config template_name=md \
            /tmp/config.schema.json docs/book/src/reference/config.md

      - name: Build book
        working-directory: docs/book
        run: mdbook build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
