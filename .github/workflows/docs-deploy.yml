name: Deploy mdBook docs to Pages

on:
  push:
    branches: [master, feat/docs-mdbook-poc]
    paths:
      - "docs/book/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      MDBOOK_VERSION: v0.5.2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: docs/book

      - name: Install mdBook (aarch64 musl, ~3MB)
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-aarch64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Build book
        working-directory: docs/book
        run: mdbook build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
